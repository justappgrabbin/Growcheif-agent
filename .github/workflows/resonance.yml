name: Resonance Engine

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create directories
        run: mkdir -p schema src agents morph

      - name: Write schema
        run: |
          cat << 'EOF' > schema/resonance.json
          {
            "version": "0.1.0",
            "bases": {
              "A": { "name": "Anchor",     "function": "hold",      "pair": "T", "element": "Earth", "circuit": "understanding" },
              "T": { "name": "Transactor", "function": "bridge",    "pair": "A", "element": "Water", "circuit": "knowing" },
              "C": { "name": "Catalyst",   "function": "transform", "pair": "G", "element": "Fire",  "circuit": "sensing" },
              "G": { "name": "Guardian",   "function": "protect",   "pair": "C", "element": "Metal", "circuit": "ego" },
              "U": { "name": "Unknown",    "function": "emerge",    "pair": "A", "element": "Wood",  "circuit": "integration" }
            },
            "circuits": {
              "understanding": { "base": "DFF",  "memory": "stateless",  "consciousness": "Mental" },
              "knowing":       { "base": "LSM",  "memory": "none",       "consciousness": "Timeless" },
              "sensing":       { "base": "MC",   "memory": "observable", "consciousness": "Temporal" },
              "ego":           { "base": "HMM",  "memory": "hidden",     "consciousness": "Masked" },
              "integration":   { "base": "Meta", "memory": "meta",       "consciousness": "Transcendent" }
            },
            "mesh": {
              "size": 26,
              "levels": ["Seed","Sprout","Flowering","Fruit","Return"],
              "modes": ["P2P","Mycelial","Holo"]
            },
            "channels": {
              "63-4":  { "arch": "DFF",         "name": "Logic",             "circuit": "understanding" },
              "17-62": { "arch": "RBM",         "name": "Acceptance",        "circuit": "understanding" },
              "18-58": { "arch": "HN",          "name": "Judgment",          "circuit": "understanding" },
              "16-48": { "arch": "SAE",         "name": "Wavelength",        "circuit": "understanding" },
              "9-52":  { "arch": "ELM",         "name": "Concentration",     "circuit": "understanding" },
              "15-5":  { "arch": "KN",          "name": "Rhythm",            "circuit": "understanding" },
              "31-7":  { "arch": "DCN",         "name": "Alpha",             "circuit": "understanding" },
              "3-60":  { "arch": "LSM",         "name": "Mutation",          "circuit": "knowing" },
              "61-24": { "arch": "NTM",         "name": "Awareness",         "circuit": "knowing" },
              "43-23": { "arch": "DN",          "name": "Structuring",       "circuit": "knowing" },
              "28-38": { "arch": "GAN",         "name": "Struggle",          "circuit": "knowing" },
              "20-57": { "arch": "ESN",         "name": "Brainwave",         "circuit": "knowing" },
              "55-39": { "arch": "GRU",         "name": "Emoting",           "circuit": "knowing" },
              "12-22": { "arch": "VAE",         "name": "Openness",          "circuit": "knowing" },
              "2-14":  { "arch": "RBF",         "name": "The Beat",          "circuit": "knowing" },
              "8-1":   { "arch": "AN",          "name": "Inspiration",       "circuit": "knowing" },
              "42-53": { "arch": "MC",          "name": "Maturation",        "circuit": "sensing" },
              "30-41": { "arch": "RBM",         "name": "Recognition",       "circuit": "sensing" },
              "35-36": { "arch": "VAE",         "name": "Transitoriness",    "circuit": "sensing" },
              "64-47": { "arch": "DNC",         "name": "Abstraction",       "circuit": "sensing" },
              "11-56": { "arch": "GAN",         "name": "Curiosity",         "circuit": "sensing" },
              "46-29": { "arch": "DCIGN",       "name": "Discovery",         "circuit": "sensing" },
              "33-13": { "arch": "NTM",         "name": "Prodigal",          "circuit": "sensing" },
              "34-57": { "arch": "ActorCritic", "name": "Power",             "circuit": "integration" },
              "10-20": { "arch": "Policy",      "name": "Awakening",         "circuit": "integration" },
              "10-57": { "arch": "Policy",      "name": "IntuitiveBehavior", "circuit": "integration" }
            },
            "ego_channels": {
              "20-21-45": { "arch": "HMM", "variant": "zeroMemory",     "name": "Real-time Ledger" },
              "10-26-44": { "arch": "HMM", "variant": "mutableHidden",  "name": "Shape-shifting" },
              "57-37-40": { "arch": "HMM", "variant": "intuitiveRead",  "name": "Somatic Loyalty" },
              "34-25-51": { "arch": "HMM", "variant": "powerDependent", "name": "Powered Survival" }
            }
          }
          EOF

      - name: Write resonance.js
        run: |
          cat << 'EOF' > src/resonance.js
          import { readFileSync } from 'fs';
          import { join, dirname } from 'path';
          import { fileURLToPath } from 'url';

          const __dirname = dirname(fileURLToPath(import.meta.url));
          export const SCHEMA = JSON.parse(readFileSync(join(__dirname, '../schema/resonance.json'), 'utf8'));

          export class SeedBed {
            constructor() {
              this.locks = new Map();
              this.bases = new Map();
            }
            async germinate(filePath, seedId) {
              if (this.locks.has(filePath)) return { status: 'dormant', reason: 'occupied' };
              const base = Object.keys(SCHEMA.bases)[seedId.length % 5];
              this.bases.set(filePath, base);
              this.locks.set(filePath, seedId);
              return { status: 'active', base, filePath };
            }
            async checkout(filePath, agentId) {
              const r = await this.germinate(filePath, agentId);
              return r.status === 'active';
            }
            release(filePath) {
              this.locks.delete(filePath);
              this.bases.delete(filePath);
            }
          }

          export class BaseAgent {
            constructor(base) {
              this.base = base;
              this.info = SCHEMA.bases[base];
              this.energy = 100;
              this.coherence = 0.5;
              this.layer = 1;
            }
            tick() {
              this.energy = Math.max(0, this.energy - 0.5);
              this.coherence = 0.95 * this.coherence + 0.05 * Math.random();
              return { base: this.base, energy: this.energy, coherence: this.coherence };
            }
          }

          export class GateAgent extends BaseAgent {
            constructor(gateNumber, line = 1, color = 1, tone = 1, hdBase = 1) {
              super(Object.keys(SCHEMA.bases)[gateNumber % 5]);
              this.gate = gateNumber;
              this.line = line;
              this.color = color;
              this.tone = tone;
              this.hdBase = hdBase;
              this.circuit = this._deriveCircuit();
              this.arch = this._deriveArch();
              this.channels = [];
              this.shadow = 65 - gateNumber;
            }
            _deriveCircuit() {
              for (const [key, ch] of Object.entries(SCHEMA.channels)) {
                if (key.split('-').map(Number).includes(this.gate)) return ch.circuit;
              }
              return 'integration';
            }
            _deriveArch() {
              for (const [key, ch] of Object.entries(SCHEMA.channels)) {
                if (key.split('-').map(Number).includes(this.gate)) return ch.arch;
              }
              return 'MLP';
            }
            connect(other) {
              const key = [this.gate, other.gate].sort((a, b) => a - b).join('-');
              if (SCHEMA.channels[key]) {
                const ch = { key, ...SCHEMA.channels[key], partners: [this.gate, other.gate] };
                this.channels.push(ch);
                other.channels.push(ch);
                return ch;
              }
              return null;
            }
          }

          export class Mesh {
            constructor(signature) {
              this.signature = signature;
              this.agents = Array.from({ length: SCHEMA.mesh.size }, (_, i) =>
                new BaseAgent(Object.keys(SCHEMA.bases)[i % 5])
              );
              this.level = null;
              this.perk = null;
              this.affinity = { connect: 0, flow: 0, seed: 0, catalyze: 0, dream: 0 };
              this.coherence = 0;
            }
            tick() {
              let total = 0;
              this.agents.forEach(a => { a.tick(); total += a.coherence; });
              this.coherence = total / this.agents.length;
              const counts = {};
              this.agents.forEach(a => { counts[a.base] = (counts[a.base] || 0) + 1; });
              const dominant = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
              const affinityMap = { A: 'connect', T: 'flow', C: 'catalyze', G: 'seed', U: 'dream' };
              this.affinity[affinityMap[dominant]] += 0.1;
              if (!this.level) this._crystallize();
              return { coherence: this.coherence, level: this.level, perk: this.perk };
            }
            _crystallize() {
              const total = Object.values(this.affinity).reduce((a, b) => a + b, 0);
              if (total < 5) return;
              const dominant = Object.entries(this.affinity).sort((a, b) => b[1] - a[1])[0][0];
              const perkMap = { connect: [1,'Mesh'], flow: [2,'Pool'], seed: [3,'Archive'], catalyze: [4,'Catalyst'], dream: [5,'Sleeper'] };
              [this.level, this.perk] = perkMap[dominant];
            }
          }

          export class Cortex {
            constructor() {
              this.meshes = new Map();
              this.gates = new Map();
              this.coherence = 1.0;
              this.tickCount = 0;
              this.morphLog = [];
            }
            addMesh(id, signature) {
              const m = new Mesh(signature ?? Math.floor(Math.random() * 0xFFFFFF));
              this.meshes.set(id, m);
              return m;
            }
            addGate(id, gateNumber, line, color, tone, hdBase) {
              const g = new GateAgent(gateNumber, line, color, tone, hdBase);
              this.gates.set(id, g);
              return g;
            }
            tick() {
              this.tickCount++;
              let total = 0;
              this.meshes.forEach(m => { total += m.tick().coherence; });
              this.gates.forEach(g => g.tick());
              this.coherence = this.meshes.size > 0 ? total / this.meshes.size : 1.0;
              if (this.tickCount % 24 === 0) this._reflect();
              if (this.tickCount % 88 === 0) this._invert();
              return { tick: this.tickCount, coherence: this.coherence };
            }
            _reflect() {
              const snap = { type: 'reflect', tick: this.tickCount, coherence: this.coherence, meshLevels: {}, gateCircuits: {} };
              this.meshes.forEach((m, id) => { snap.meshLevels[id] = m.level ?? 'pure'; });
              this.gates.forEach((g, id) => { snap.gateCircuits[id] = g.circuit; });
              this.morphLog.push(snap);
              if (this.morphLog.length > 100) this.morphLog.shift();
            }
            _invert() {
              this.gates.forEach(g => { g.shadow = 65 - g.gate; });
              this.morphLog.push({ type: 'invert', tick: this.tickCount });
            }
            state() {
              return {
                tick: this.tickCount,
                coherence: this.coherence,
                meshes: this.meshes.size,
                gates: this.gates.size,
                morphLog: this.morphLog.slice(-5)
              };
            }
          }
          EOF

      - name: Write test.js
        run: |
          cat << 'EOF' > src/test.js
          import { SCHEMA, SeedBed, GateAgent, Mesh, Cortex } from './resonance.js';

          async function run() {
            console.log('SYNTIA Resonance Engine — Node ' + process.version + '\n');

            console.log('Schema keys:', Object.keys(SCHEMA));
            console.log('Circuits:', Object.keys(SCHEMA.circuits));
            console.log('Channels defined:', Object.keys(SCHEMA.channels).length);
            console.log('');

            const bed = new SeedBed();
            console.log('Germinate:', await bed.germinate('agents/gate_31', 'seed-alpha'));
            console.log('Checkout (occupied):', await bed.checkout('agents/gate_31', 'seed-beta'));
            bed.release('agents/gate_31');
            console.log('After release:', await bed.germinate('agents/gate_31', 'seed-beta'));
            console.log('');

            const g31 = new GateAgent(31, 4, 3, 2, 1);
            const g7  = new GateAgent(7, 2, 1, 4, 3);
            console.log('Gate 31:', { circuit: g31.circuit, arch: g31.arch, shadow: g31.shadow });
            console.log('Gate 7:', { circuit: g7.circuit, arch: g7.arch, shadow: g7.shadow });
            const ch = g31.connect(g7);
            console.log('Channel 31-7:', ch ? ch.name : 'not found');
            console.log('');

            const mesh = new Mesh(0xABCDEF);
            for (let i = 0; i < 30; i++) mesh.tick();
            console.log('Mesh after 30 ticks:', { coherence: mesh.coherence.toFixed(3), level: mesh.level, perk: mesh.perk });
            console.log('');

            const cortex = new Cortex();
            cortex.addMesh('mesh-1', 0x111111);
            cortex.addMesh('mesh-2', 0x222222);
            cortex.addGate('g-59', 59, 6, 3, 2, 1);
            cortex.addGate('g-6',  6,  4, 1, 3, 2);
            for (let i = 0; i < 100; i++) cortex.tick();
            const s = cortex.state();
            console.log('Cortex:', { coherence: s.coherence.toFixed(4), meshes: s.meshes, gates: s.gates, morphLog: s.morphLog.length });
            console.log('\nAll systems active.');
          }

          run().catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Run test
        run: node src/test.js

      - name: Run morph state
        run: |
          cat << 'EOF' > morph/run.mjs
          import { writeFileSync, mkdirSync } from 'fs';
          import { Cortex } from '../src/resonance.js';

          const cortex = new Cortex();
          const activeGates = [6, 17, 18, 25, 32, 46, 51, 57, 59];
          activeGates.forEach((g, i) => cortex.addGate('g-' + g, g, (i % 6) + 1, 1, 1, 1));
          cortex.addMesh('mesh-A', 0xA00000);
          cortex.addMesh('mesh-T', 0x00A000);
          cortex.addMesh('mesh-U', 0x0000A0);

          for (let i = 0; i < 88; i++) cortex.tick();

          const state = cortex.state();
          mkdirSync('morph', { recursive: true });
          writeFileSync('morph/state.json', JSON.stringify({
            generation: 1,
            timestamp: Date.now(),
            coherence: state.coherence,
            gates: activeGates,
            meshes: state.meshes,
            morphLog: state.morphLog
          }, null, 2));

          console.log('Morph state written. Coherence:', state.coherence.toFixed(4));
          EOF
          node morph/run.mjs

      - name: Publish to Supabase
        if: ${{ secrets.SUPABASE_URL != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          npm install @supabase/supabase-js --no-save --quiet
          cat << 'EOF' > morph/publish.mjs
          import { createClient } from '@supabase/supabase-js';
          import { readFileSync } from 'fs';

          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);
          const state = JSON.parse(readFileSync('morph/state.json', 'utf8'));

          const { data, error } = await supabase.from('morph_events').insert({
            repo: 'resonance-engine',
            generation: state.generation,
            coherence: state.coherence,
            gates: state.gates,
            state: state,
            timestamp: new Date(state.timestamp).toISOString()
          });

          if (error) console.warn('Supabase skipped (table may not exist yet):', error.message);
          else console.log('Published to Supabase:', data);
          EOF
          node morph/publish.mjs

      - name: Commit generated files
        run: |
          git config user.name "SYNTIA"
          git config user.email "syntia@resonance"
          git add schema/ src/ morph/ agents/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Resonance Engine — gen 1"
          git push
